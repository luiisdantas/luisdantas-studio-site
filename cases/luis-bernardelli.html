<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luis Bernardelli — Branding | luisdantas.studio</title>
  <meta name="description" content="Branding estratégico para consultor de consórcios: plataforma de marca, identidade visual e ecossistema de conteúdo para Instagram.">

  <meta property="og:title" content="Luis Bernardelli — Branding | luisdantas.studio">
  <meta property="og:description" content="Marca completa para consultor de consórcios. Do posicionamento à identidade visual e social media.">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://luisdantas.studio/cases/luis-bernardelli">
  <meta property="og:image" content="/assets/images/cases/luis-bernardelli/hero-cover.png">
  <meta property="og:locale" content="pt_BR">

  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    /* Remove body scroll — iframe handles scrolling */
    html, body {
      height: 100%;
      overflow: hidden;
    }

    /* Header always dark on this page */
    .header {
      background: rgba(10, 38, 71, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header__logo,
    .header__link {
      color: #fff !important;
    }

    .header__link:hover,
    .header__link.active {
      color: rgba(255,255,255,0.7) !important;
    }

    .header__menu-btn span {
      background-color: #fff !important;
    }

    /* Scrolled state — keep dark (presentation is always dark on scroll) */
    .header.scrolled {
      background: rgba(10, 38, 71, 0.99);
    }

    /* Iframe fills everything below header */
    .deck-frame {
      display: block;
      width: 100%;
      height: calc(100vh - var(--header-height, 64px));
      border: none;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header header--dark" id="header">
    <div class="container header__inner">
      <a href="/" class="header__logo">luisdantas<span class="header__logo-dot">.studio</span></a>

      <nav class="header__nav" id="nav">
        <a href="/cases" class="header__link active">Cases</a>
        <a href="/#processo" class="header__link">Processo</a>
        <a href="/#sobre" class="header__link">Sobre</a>
        <a href="/contato" class="header__link header__link--cta">Contato</a>
      </nav>

      <button class="header__menu-btn" id="menu-btn" aria-label="Abrir menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- PRESENTATION EMBED -->
  <iframe
    id="deckFrame"
    class="deck-frame"
    src="/cases/luis-bernardelli-deck"
    title="Luis Bernardelli — Apresentação de Marca"
    loading="eager"
    scrolling="yes"
  ></iframe>

  <script src="/js/main.js"></script>
  <script>
    // Once the iframe loads (same-origin), hide the presentation's internal nav
    // and compensate for its removed height in the first section.
    document.getElementById('deckFrame').addEventListener('load', function () {
      try {
        const doc = this.contentDocument || this.contentWindow.document;
        const nav = doc.querySelector('nav');
        if (nav) nav.style.display = 'none';

        // Remove the top padding reserved for the internal nav on the first section
        const firstSection = doc.querySelector('section');
        if (firstSection) {
          const current = parseFloat(getComputedStyle(firstSection).paddingTop) || 96;
          firstSection.style.paddingTop = Math.max(current - 52, 48) + 'px';
        }
      } catch (e) {
        // Cross-origin fallback — just let the presentation render as-is
      }
    });
  </script>
</body>
</html>
